; ============================================================================
; NumpadOS Configuration File
; ============================================================================
; Edit this file to customize NumpadOS behavior.
; Changes take effect after script reload (Ctrl+NumLock).
;
; Environment variables supported:
;   %AppData%       - User's AppData folder
;   %LOCALAPPDATA%  - User's Local AppData folder
;   %USERPROFILE%   - User's home directory
;   %ProgramFiles%  - Program Files directory
;   %TEMP%          - Temp directory
; ============================================================================

; ============================================================================
; [Logging] - Log file and debug settings
; ============================================================================
[Logging]

; Directory where log files are stored (created if doesn't exist)
; Leave blank or comment out to use: %AppData%\NumpadOS
LogDir=Logs

; Enable debug mode (shows extra logging in debug output)
; 0 = OFF (default, silent operation)
; 1 = ON (verbose logging for troubleshooting)
DebugMode=0

; ============================================================================
; [Applications] - Application paths and shortcuts
; ============================================================================
; Edit these paths to match your system configuration.
; Most apps are auto-detected via known install locations or PATH, but some
; need explicit configuration.
; ============================================================================
[Applications]

; ---- BRAVE PWA SHORTCUTS ----
; ChatGPT, Claude and YouTube are Brave PWAs, NOT desktop applications.
; These must be absolute paths to .lnk shortcut files - never .exe paths.
; Find shortcuts in: %AppData%\Microsoft\Windows\Start Menu\Programs\Brave Apps\

ChatGPTShortcut=%AppData%\Microsoft\Windows\Start Menu\Programs\Brave Apps\ChatGPT.lnk

ClaudeShortcut=%AppData%\Microsoft\Windows\Start Menu\Programs\Brave Apps\Claude.lnk

YouTubeShortcut=%AppData%\Microsoft\Windows\Start Menu\Programs\Brave Apps\YouTube.lnk

; ---- DESKTOP APPLICATION PATHS ----
; Leave blank to let NumpadOS auto-detect common install locations.
; If an app isn't found automatically, set its full .exe path here.

; Harmonoid - fixed install path (no guessing/searching is performed)
HarmonoidPath=C:\Harmonoid\harmonoid.exe

; Obsidian - fixed install path (no guessing/searching is performed)
ObsidianPath=C:\Program Files\Obsidian\Obsidian.exe

; VS Code - "code" works if VS Code's CLI is on PATH
VSCodePath=code

; Command Prompt - must be cmd.exe, NOT Windows Terminal (wt.exe)
CommandPromptPath=cmd.exe

; Windows Notepad
NotepadPath=notepad.exe

; Brave Browser - fixed install path (no guessing/searching is performed)
BravePath=C:\Program Files\BraveSoftware\Brave-Browser\Application\brave.exe

; Task Manager
TaskManagerPath=taskmgr.exe

; ============================================================================
; [UI] - User interface settings
; ============================================================================
[UI]

; Show toast notifications for app launches
; 0 = OFF (silent operation - recommended)
; 1 = ON (show brief toasts)
ShowToasts=0

; Toast display duration in milliseconds
; Recommended: 500-1000
ToastDuration=800

; ============================================================================
; [Startup] - Script startup behavior
; ============================================================================
[Startup]

; Launch NumpadOS on Windows startup
; 0 = OFF (default)
; 1 = ON (requires registry setup)
LaunchOnStartup=0

; Enforce single instance only
; 0 = OFF (allow multiple instances)
; 1 = ON (default, only one NumpadOS running at a time)
OneInstanceOnly=1

; ============================================================================
; QUICK REFERENCE - NUMPAD HOTKEY MAP
; ============================================================================
; When Num Lock is OFF, the numpad is remapped:
;
;    7 (NumpadHome)         8 (NumpadUp)         9 (NumpadPgUp)
;    YouTube                Notepad              Brave Browser
;
;    4 (NumpadLeft)         5 (NumpadClear)      6 (NumpadRight)
;    Obsidian               VS Code              Command Prompt
;
;    1 (NumpadEnd)          2 (NumpadDown)       3 (NumpadPgDn)
;    ChatGPT                Claude               Harmonoid
;
;    0 (NumpadIns)          . (NumpadDel)
;    Task Manager           File Explorer
;
;    / (NumpadDiv)          * (NumpadMult)       - (NumpadSub)        + (NumpadAdd)
;    Windows Settings       Close (Alt+F4)       Minimize             Maximize/Restore
;
;    Enter (NumpadEnter)
;    Clipboard History (Win+V)
;
; When Num Lock is ON, the numpad behaves normally (0-9 numbers work as expected).
;
; Ctrl+NumLock = Reload Script
; ============================================================================
